<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 專題 (二)：Gemini 網頁實戰 - 繁星電腦課程</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans TC', sans-serif; }
        .gradient-text {
            background-image: linear-gradient(to right, #06b6d4, #0891b2, #0e7490);
            -webkit-background-clip: text; background-clip: text; color: transparent;
        }
        .step-number {
            width: 32px; height: 32px; background: #06b6d4; color: white;
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-weight: bold; flex-shrink: 0; box-shadow: 0 4px 6px -1px rgba(6, 182, 212, 0.4);
        }
        .code-preview {
            background: #1e1e1e; color: #d4d4d4; padding: 1.5rem; border-radius: 1rem;
            font-family: 'Fira Code', monospace; font-size: 0.75rem; line-height: 1.5;
            border: 1px solid #333; overflow-x: auto;
        }
        .template-card { border: 1px solid #e5e7eb; transition: all 0.2s; }
        .template-card:hover { border-color: #06b6d4; background: #f0fdfa; transform: scale(1.02); }
    </style>
</head>
<body class="bg-gray-50 min-h-screen flex flex-col">

<header class="bg-white shadow-sm border-b sticky top-0 z-50">
    <div class="container mx-auto px-6 py-4 flex justify-between items-center">
        <div>
            <h1 class="text-xl md:text-2xl font-bold gradient-text text-cyan-600">AI 專題 (二)：Gemini 網頁實戰</h1>
            <p class="text-[10px] text-gray-400 mt-1 uppercase tracking-widest font-bold font-mono text-cyan-800">Prompt Driven Development</p>
        </div>
        <a href="index.html" class="bg-cyan-50 text-cyan-600 hover:bg-cyan-600 hover:text-white font-bold py-2 px-4 rounded-xl transition-all text-xs">← 返回課程列表</a>
    </div>
</header>

<div class="flex-1 flex flex-col md:flex-row container mx-auto px-4 py-8 gap-8 overflow-hidden">
    <nav class="w-full md:w-72 flex-shrink-0">
        <div class="bg-white rounded-3xl shadow-xl p-5 sticky top-24 border border-gray-100">
            <h3 class="text-xs font-black text-gray-400 uppercase tracking-widest mb-6 px-2">實戰手冊 / Handbook</h3>
            <ul id="menu" class="space-y-2 text-sm font-medium">
                <li data-id="steps" class="menu-item active bg-cyan-600 text-white px-4 py-4 rounded-2xl cursor-pointer transition-all flex items-center gap-3">
                    <span>🏗️</span> 1. 開發邏輯與分層
                </li>
                <li data-id="prompt_web" class="menu-item hover:bg-cyan-50 px-4 py-4 rounded-2xl cursor-pointer transition-all flex items-center gap-3 text-gray-600">
                    <span>✍️</span> 2. 結構化指令範例
                </li>
                <li data-id="styles" class="menu-item hover:bg-cyan-50 px-4 py-4 rounded-2xl cursor-pointer transition-all flex items-center gap-3 text-gray-600">
                    <span>🎨</span> 3. 網頁美感關鍵詞
                </li>
                <li data-id="fix" class="menu-item hover:bg-cyan-50 px-4 py-4 rounded-2xl cursor-pointer transition-all flex items-center gap-3 text-gray-600">
                    <span>🔧</span> 4. 錯誤排除與溝通
                </li>
            </ul>
        </div>
    </nav>

    <main class="flex-1 flex flex-col gap-6 overflow-hidden">
        <div class="bg-white rounded-3xl shadow-xl p-8 md:p-12 min-h-[550px] border border-gray-100">
            <h2 id="current-title" class="text-3xl font-black text-gray-800 mb-8 border-b pb-6">開發流程</h2>
            <div id="content-area" class="w-full"></div>
        </div>
    </main>
</div>

<footer class="bg-white border-t py-8 mt-12">
    <div class="container mx-auto px-6 text-center">
        <p class="text-gray-400 text-[10px] tracking-widest font-bold uppercase">&copy; 2026 Andy Wang &bull; Web Design x AI</p>
    </div>
</footer>

<script>
    const chapters = {
        steps: {
            title: "AI 輔助開發的三層次邏輯",
            html: `
                <div class="max-w-3xl space-y-8">
                    <p class="text-sm text-gray-600 leading-relaxed italic border-l-4 border-cyan-500 pl-4">不要一次叫 AI 寫完整個網站，分開來做會更精準！</p>
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                        <div class="p-6 bg-white border rounded-2xl shadow-sm text-center">
                            <div class="step-number mx-auto mb-4">1</div>
                            <h4 class="font-bold text-gray-800 mb-2">結構 (HTML)</h4>
                            <p class="text-[11px] text-gray-500">定義網站有幾個區塊：導覽列、大圖區、關於我、作品清單。</p>
                        </div>
                        <div class="p-6 bg-white border rounded-2xl shadow-sm text-center">
                            <div class="step-number mx-auto mb-4">2</div>
                            <h4 class="font-bold text-gray-800 mb-2">風格 (CSS)</h4>
                            <p class="text-[11px] text-gray-500">使用 Tailwind CSS 指令來控制顏色、圓角、間距與漸層效果。</p>
                        </div>
                        <div class="p-6 bg-white border rounded-2xl shadow-sm text-center">
                            <div class="step-number mx-auto mb-4">3</div>
                            <h4 class="font-bold text-gray-800 mb-2">生命 (JS)</h4>
                            <p class="text-[11px] text-gray-500">用 jQuery 讓元件動起來：如點擊圖片放大、捲動時出現動畫。</p>
                        </div>
                    </div>
                </div>
            `
        },
        prompt_web: {
            title: "如何寫出讓 AI 聽得懂的網頁指令？",
            html: `
                <div class="max-w-3xl space-y-6">
                    <p class="text-sm text-gray-600 mb-4 font-bold">試著複製下面這段「黃金模板」貼給 Gemini：</p>
                    <div class="code-preview shadow-2xl relative">
                        <div class="absolute top-4 right-4 text-[10px] text-cyan-500">PROMPT TEMPLATE</div>
                        「請扮演資深的網頁前端工程師。<br>
                        我想開發一個【個人攝影作品集】網頁，請提供完整的單一 HTML 檔案代碼。<br><br>
                        技術要求：<br>
                        1. 使用 HTML5 和 Tailwind CSS。<br>
                        2. 風格：深色模式，使用磨砂玻璃 (Glassmorphism) 的設計感。<br>
                        3. 區塊需求：<br>
                           - 固定在頂部的導覽列 (Navbar)<br>
                           - 一個滿版的主視覺區 (Hero Section)，要有超大標題<br>
                           - 三欄式的圖片展示區，滑鼠移上去要有縮放特效」
                    </div>
                </div>
            `
        },
        styles: {
            title: "網頁美感的「秘密單字」",
            html: `
                <div class="max-w-3xl">
                    <p class="text-sm text-gray-600 mb-6 leading-relaxed text-left">把這些關鍵詞加到你的指令裡，AI 就會給你完全不同的等級！</p>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div class="template-card p-4 rounded-xl shadow-sm bg-white">
                            <h5 class="font-black text-cyan-600 text-sm mb-1 uppercase tracking-tighter">Glassmorphism</h5>
                            <p class="text-xs text-gray-800 font-bold mb-1">磨砂玻璃風</p>
                            <p class="text-[10px] text-gray-500 leading-relaxed italic">「半透明背景，搭配模糊效果，看起來像霧面玻璃。」</p>
                        </div>
                        <div class="template-card p-4 rounded-xl shadow-sm bg-white">
                            <h5 class="font-black text-cyan-600 text-sm mb-1 uppercase tracking-tighter">Gradient Text</h5>
                            <p class="text-xs text-gray-800 font-bold mb-1">漸層文字</p>
                            <p class="text-[10px] text-gray-500 leading-relaxed italic">「讓大標題從藍色變成紫色，看起來非常有科技感。」</p>
                        </div>
                        <div class="template-card p-4 rounded-xl shadow-sm bg-white">
                            <h5 class="font-black text-cyan-600 text-sm mb-1 uppercase tracking-tighter">Hover Effects</h5>
                            <p class="text-xs text-gray-800 font-bold mb-1">懸停特效</p>
                            <p class="text-[10px] text-gray-500 leading-relaxed italic">「當滑鼠移到按鈕上，按鈕要發光並稍微放大。」</p>
                        </div>
                        <div class="template-card p-4 rounded-xl shadow-sm bg-white">
                            <h5 class="font-black text-cyan-600 text-sm mb-1 uppercase tracking-tighter">Smooth Scroll</h5>
                            <p class="text-xs text-gray-800 font-bold mb-1">平滑捲動</p>
                            <p class="text-[10px] text-gray-500 leading-relaxed italic">「點擊選單後，畫面要優雅地滑到那個位置，而不是跳過去。」</p>
                        </div>
                    </div>
                </div>
            `
        },
        fix: {
            title: "程式壞了？別急著放棄！",
            html: `
                <div class="max-w-3xl space-y-8">
                    <p class="text-sm text-gray-600 leading-relaxed font-medium">當網頁顯示不如預期，你可以這樣跟 AI 溝通：</p>
                    <div class="space-y-4">
                        <div class="bg-red-50 p-5 rounded-2xl border-l-8 border-red-400">
                            <p class="text-xs font-bold text-red-800 mb-2">溝通情境 A：畫面跑版</p>
                            <p class="text-[11px] text-red-600 italic leading-relaxed">「你給我的導覽列在手機上看會變得很擠，請幫我修改成：在手機版時自動變成漢堡選單 (Hamburger menu)。」</p>
                        </div>
                        <div class="bg-blue-50 p-5 rounded-2xl border-l-8 border-blue-400">
                            <p class="text-xs font-bold text-blue-800 mb-2">溝通情境 B：功能失效</p>
                            <p class="text-[11px] text-blue-600 italic leading-relaxed">「點擊圖片沒有彈出放大視窗，請檢查我的代碼是否漏掉了 jQuery 的 CDN 連結？」</p>
                        </div>
                    </div>
                </div>
            `
        }
    };

    function render(id) {
        const data = chapters[id];
        $('#current-title').text(data.title);
        $('#content-area').html(data.html).hide().fadeIn(400);
    }

    $('#menu li').click(function() {
        $('.menu-item').removeClass('active bg-cyan-600 text-white shadow-cyan-200 shadow-lg').addClass('hover:bg-cyan-50 text-gray-600');
        $(this).addClass('active bg-cyan-600 text-white shadow-cyan-200 shadow-lg').removeClass('hover:bg-cyan-50 text-gray-600');
        render($(this).data('id'));
    });

    $(document).ready(() => render('steps'));
</script>
</body>
</html>
