<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>第十一章：Git 版本的時光機 - 繁星電腦課程</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    
    <!-- Prism.js 語法高亮 -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css" rel="stylesheet" />
    <link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/plugins/line-numbers/prism-line-numbers.min.css" rel="stylesheet" />
    
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Noto Sans TC', sans-serif; }
        .gradient-text {
            background-image: linear-gradient(to right, #f97316, #fb923c, #ef4444);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        
        pre[class*="language-"] {
            margin: 0 !important;
            padding: 1.5rem !important;
            background: #1e1e1e !important;
            border-radius: 0 !important;
            height: 100%;
            font-family: 'Fira Code', monospace !important;
            font-size: 14px !important;
        }

        .terminal-box {
            background: #0f172a;
            color: #38bdf8;
            font-family: 'Fira Code', monospace;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 600px;
        }

        .terminal-header {
            display: flex;
            gap: 6px;
            margin-bottom: 15px;
        }
        .dot { width: 12px; height: 12px; border-radius: 50%; }
        .dot-red { background: #ff5f56; }
        .dot-yellow { background: #ffbd2e; }
        .dot-green { background: #27c93f; }

        .menu-item.active {
            background: #fff7ed;
            color: #ea580c;
            font-weight: 600;
        }
    </style>
</head>
<body class="bg-gray-100 min-h-screen flex flex-col">

<!-- Header -->
<header class="bg-white shadow-sm border-b">
    <div class="container mx-auto px-6 py-6 flex justify-between items-center">
        <div>
            <h1 class="text-2xl font-bold gradient-text">第十一章：Git 版本的時光機</h1>
            <p class="text-sm text-gray-500 mt-1">繁星雙語蒙特梭利實驗教育團體</p>
        </div>
        <a href="index.html" class="bg-gray-200 hover:bg-gray-300 text-gray-700 font-medium py-2 px-4 rounded-lg transition-colors text-sm">
            ← 返回課程列表
        </a>
    </div>
</header>

<div class="flex-1 flex flex-col md:flex-row container mx-auto px-4 py-8 gap-6 overflow-hidden">
    <!-- 側邊導航 -->
    <nav class="w-full md:w-64 flex-shrink-0">
        <div class="bg-white rounded-2xl shadow-lg p-4 sticky top-8 text-sm">
            <h3 class="text-xs font-bold text-gray-400 uppercase tracking-wider mb-4 px-2">Git 指令地圖</h3>
            <ul id="menu" class="space-y-1">
                <li data-id="intro" class="menu-item active px-4 py-3 rounded-xl cursor-pointer transition-all flex items-center gap-3">
                    <span>📖</span> 什麼是 Git？
                </li>
                <li data-id="start" class="menu-item hover:bg-gray-50 px-4 py-3 rounded-xl cursor-pointer transition-all flex items-center gap-3 text-gray-600">
                    <span>🚀</span> 1. 建立專案庫 (Init/Clone)
                </li>
                <li data-id="basic" class="menu-item hover:bg-gray-50 px-4 py-3 rounded-xl cursor-pointer transition-all flex items-center gap-3 text-gray-600">
                    <span>📝</span> 2. 日常存檔 (Add/Commit)
                </li>
                <li data-id="remote" class="menu-item hover:bg-gray-50 px-4 py-3 rounded-xl cursor-pointer transition-all flex items-center gap-3 text-gray-600">
                    <span>☁️</span> 3. 連接雲端 (Remote/Push)
                </li>
                <li data-id="sync" class="menu-item hover:bg-gray-50 px-4 py-3 rounded-xl cursor-pointer transition-all flex items-center gap-3 text-gray-600">
                    <span>🔄</span> 4. 同步與分支 (Pull/Check)
                </li>
                <li data-id="undo" class="menu-item hover:bg-gray-50 px-4 py-3 rounded-xl cursor-pointer transition-all flex items-center gap-3 text-gray-600">
                    <span>🔙</span> 5. 復原與回滾 (Undo)
                </li>
            </ul>
        </div>
    </nav>

    <!-- 主內容區 -->
    <main class="flex-1 flex flex-col gap-6 overflow-hidden">
        <!-- 預覽/說明區 -->
        <div class="bg-white rounded-2xl shadow-xl p-8 flex flex-col items-center justify-center min-h-[350px] border border-gray-100 relative">
            <div class="absolute top-4 left-6">
                <span class="text-xs font-bold text-gray-300 uppercase tracking-widest">Git Concept 概念解說</span>
            </div>
            
            <div id="preview-area" class="w-full flex flex-col items-center">
                <!-- 由 JS 動態生成內容 -->
            </div>
        </div>

        <!-- 指令範例區 -->
        <div class="bg-white rounded-2xl shadow-xl overflow-hidden flex flex-col h-[450px] border border-gray-100">
            <div class="flex items-center justify-between px-6 py-3 bg-gray-50 border-b border-gray-100">
                <span class="text-xs font-bold text-gray-400">COMMAND EXAMPLES</span>
                <span class="text-[10px] text-gray-400 font-mono">GIT v2.x</span>
            </div>
            <div class="flex-1 overflow-hidden">
                <pre class="line-numbers"><code id="code-content" class="language-bash"></code></pre>
            </div>
        </div>
    </main>
</div>

<footer class="bg-gray-800 text-white mt-12">
    <div class="container mx-auto px-6 py-6 text-center text-gray-400 text-sm">
        <p>&copy; 2026 Andy Wang. All Rights Reserved.</p>
    </div>
</footer>

<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-bash.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/plugins/line-numbers/prism-line-numbers.min.js"></script>

<script>
    const content = {
        intro: {
            title: "什麼是 Git？版本的時光機",
            desc: `Git 就像是玩遊戲時的「存檔點」。它記錄你程式碼的每一個變化，讓你寫壞時能隨時「穿越」回過去。`,
            preview: `
                <div class="grid grid-cols-3 gap-4 w-full max-w-lg text-center">
                    <div class="p-4 bg-blue-50 rounded-xl border-2 border-blue-100">
                        <div class="text-2xl mb-2">📁</div>
                        <div class="text-xs font-bold text-blue-600">工作目錄</div>
                        <div class="text-[10px] text-gray-400">寫程式的地方</div>
                    </div>
                    <div class="p-4 bg-yellow-50 rounded-xl border-2 border-yellow-100">
                        <div class="text-2xl mb-2">📦</div>
                        <div class="text-xs font-bold text-yellow-600">暫存區</div>
                        <div class="text-[10px] text-gray-400">準備要存檔</div>
                    </div>
                    <div class="p-4 bg-green-50 rounded-xl border-2 border-green-100">
                        <div class="text-2xl mb-2">🏛️</div>
                        <div class="text-xs font-bold text-green-600">儲存庫</div>
                        <div class="text-[10px] text-gray-400">正式歷史紀錄</div>
                    </div>
                </div>
            `,
            code: `# 設定你的身分 (全台電腦只需設一次)
git config --global user.name "Your Name"
git config --global user.email "mail@example.com"

# 查看目前設定
git config --list`
        },
        start: {
            title: "1. 建立儲存庫 (Repository)",
            desc: "有兩種方式開始：將現有資料夾變成 Git 專案，或是從雲端下載別人的專案。",
            preview: `
                <div class="flex gap-8 items-center justify-center">
                    <div class="text-center p-4 bg-white border-2 border-dashed border-orange-200 rounded-xl">
                        <div class="text-xl font-bold text-orange-600 mb-1">git init</div>
                        <div class="text-[10px] text-gray-400">自己從零開始</div>
                    </div>
                    <div class="text-gray-300 font-bold">OR</div>
                    <div class="text-center p-4 bg-orange-500 text-white rounded-xl shadow-lg">
                        <div class="text-xl font-bold mb-1">git clone</div>
                        <div class="text-[10px] text-orange-100">下載現成專案</div>
                    </div>
                </div>
            `,
            code: `# 方式 A：在目前的資料夾建立新的儲存庫
git init

# 方式 B：從雲端 (如 GitHub) 下載一個完整的儲存庫
# 會自動幫你建立資料夾並設定好遠端連結
git clone https://github.com/username/project.git`
        },
        basic: {
            title: "2. 日常存檔：Status, Add, Commit",
            desc: "這是開發者最頻繁的操作。修改完程式後，務必記得 commit 存檔！",
            preview: `
                <div class="flex flex-col gap-2 items-center">
                    <div class="px-4 py-2 bg-gray-100 rounded-lg text-sm italic">修改代碼...</div>
                    <div class="text-orange-500 font-bold">git status (檢查)</div>
                    <div class="text-orange-500">⬇️ git add .</div>
                    <div class="px-4 py-2 bg-yellow-100 rounded-lg text-sm font-bold">暫存區 (打包中)</div>
                    <div class="text-green-500">⬇️ git commit -m "訊息"</div>
                    <div class="px-4 py-2 bg-green-500 text-white rounded-lg text-sm font-bold">成功存檔！</div>
                </div>
            `,
            code: `# 檢查檔案狀態 (哪些沒存？哪些改了？)
git status

# 將所有修改加入暫存區 (打包)
git add .

# 正式提交存檔，並寫下這版改了什麼
git commit -m "完成首頁導覽列美化"`
        },
        remote: {
            title: "3. 連接雲端 (GitHub)",
            desc: "本地存檔後，需要跟雲端的 GitHub 儲存庫進行連接與同步。",
            preview: `
                <div class="terminal-box">
                    <div class="terminal-header"><div class="dot dot-red"></div><div class="dot dot-yellow"></div><div class="dot dot-green"></div></div>
                    <div class="text-xs">
                        <span class="text-green-400">$ git remote add origin ...</span><br>
                        <span class="text-green-400">$ git push -u origin main</span><br>
                        <span class="text-white">Enumerating objects: 5, done.</span>
                    </div>
                </div>
            `,
            code: `# 第一次連接 GitHub 儲存庫 (只需做一次)
git remote add origin https://github.com/你的帳號/倉庫名.git

# 將目前的存檔推送到 GitHub 的 main 分支
# -u 會記住設定，以後只需輸入 git push
git push -u origin main

# 查看目前連接的遠端伺服器
git remote -v`
        },
        sync: {
            title: "4. 同步與分支切換",
            desc: "下載最新版、查看分支，或切換到不同的開發版本。",
            preview: `
                <div class="flex items-center gap-6">
                    <div class="text-center">🌿<br><span class="text-[10px]">分支切換</span></div>
                    <div class="text-orange-500 font-bold">↔️</div>
                    <div class="text-center">☁️<br><span class="text-[10px]">抓取更新</span></div>
                </div>
            `,
            code: `# 從 GitHub 抓取最新進度並合併到你的電腦
git pull

# 只抓取紀錄但不合併 (這叫 Fetch)
git fetch

# 查看有哪些分支
git branch

# 切換到另一個分支 (例如切換到 dev)
git checkout dev

# 建立並同時切換到新分支
git checkout -b new-feature`
        },
        undo: {
            title: "5. 救命指令：復原與回滾",
            desc: "Git 的價值在於犯錯時能及時修正。這就是所謂的 Rollback。",
            preview: `
                <div class="flex flex-col items-center text-red-500">
                    <div class="text-3xl animate-pulse">🔙</div>
                    <div class="text-xs font-bold uppercase mt-2">時光回溯中</div>
                </div>
            `,
            code: `# 1. (還沒 add) 放棄修改，回到上次存檔的樣子
git checkout -- 檔名.html

# 2. (已經存檔) 建立一個「反向存檔」來取消之前的內容 (Revert)
# 這樣歷史紀錄會留著，最安全
git revert <commitID>

# 3. (暴力回滾) 強制回到某個存檔點，後面的紀錄都不要了 (Reset)
# 此指令很危險，使用前請確認！
git reset --hard HEAD^      # 回到前一個版本
git reset --hard <commitID> # 回到指定版本`
        }
    };

    let currentItem = 'intro';

    function render() {
        const item = content[currentItem];
        $('#current-title').text(item.title);
        $('#preview-area').html(`
            <div class="text-center mb-6 max-w-md">
                <p class="text-gray-600 leading-relaxed text-sm">${item.desc}</p>
            </div>
            ${item.preview}
        `);
        
        const codeElement = document.getElementById('code-content');
        codeElement.textContent = item.code;
        Prism.highlightElement(codeElement);
    }

    $('#menu li').click(function() {
        $('.menu-item').removeClass('active bg-orange-50 text-orange-600').addClass('hover:bg-gray-50 text-gray-600');
        $(this).addClass('active bg-orange-50 text-orange-600').removeClass('hover:bg-gray-50 text-gray-600');
        currentItem = $(this).data('id');
        render();
    });

    $(document).ready(() => render());
</script>

</body>
</html>
