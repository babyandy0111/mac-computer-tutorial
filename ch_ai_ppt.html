<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 專題 (四)：AI 簡報大師 - 繁星電腦課程</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans TC', sans-serif; }
        .gradient-text {
            background-image: linear-gradient(to right, #6366f1, #818cf8, #4f46e5);
            -webkit-background-clip: text; background-clip: text; color: transparent;
        }
        .flow-card {
            background: white; border: 1px solid #e5e7eb; border-radius: 1.5rem;
            padding: 1.5rem; position: relative; transition: all 0.3s;
        }
        .flow-card:hover { border-color: #818cf8; transform: translateX(10px); }
        .connector { width: 2px; height: 20px; background: #e5e7eb; margin-left: 2.5rem; }
        .slide-mockup {
            aspect-ratio: 16 / 9; background: #1e293b; border-radius: 0.5rem;
            padding: 1rem; color: white; font-size: 0.5rem; border: 4px solid #334155;
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen flex flex-col font-sans">

<header class="bg-white shadow-sm border-b sticky top-0 z-50">
    <div class="container mx-auto px-6 py-4 flex justify-between items-center">
        <div>
            <h1 class="text-xl md:text-2xl font-bold gradient-text">AI 專題 (四)：AI 簡報大師</h1>
            <p class="text-[10px] text-gray-400 mt-1 uppercase tracking-widest font-black text-indigo-800 font-mono">Next-Gen Presentation Workflow</p>
        </div>
        <a href="index.html" class="bg-indigo-50 text-indigo-600 hover:bg-indigo-600 hover:text-white font-bold py-2 px-4 rounded-xl transition-all text-xs">← 返回課程列表</a>
    </div>
</header>

<div class="flex-1 flex flex-col md:flex-row container mx-auto px-4 py-8 gap-8 overflow-hidden">
    <nav class="w-full md:w-72 flex-shrink-0">
        <div class="bg-white rounded-3xl shadow-xl p-5 sticky top-24 border border-gray-100">
            <h3 class="text-xs font-black text-gray-400 uppercase tracking-widest mb-6 px-2">製作階段 / Stages</h3>
            <ul id="menu" class="space-y-2 text-sm font-medium">
                <li data-id="workflow" class="menu-item active bg-indigo-600 text-white px-4 py-4 rounded-2xl cursor-pointer transition-all flex items-center gap-3">
                    <span>🔄</span> 1. 流程：最強工作流
                </li>
                <li data-id="content" class="menu-item hover:bg-indigo-50 px-4 py-4 rounded-2xl cursor-pointer transition-all flex items-center gap-3 text-gray-600">
                    <span>📂</span> 2. 核心：內容提煉
                </li>
                <li data-id="design" class="menu-item hover:bg-indigo-50 px-4 py-4 rounded-2xl cursor-pointer transition-all flex items-center gap-3 text-gray-600">
                    <span>🎨</span> 3. 視覺：排版美學
                </li>
                <li data-id="expert" class="menu-item hover:bg-indigo-50 px-4 py-4 rounded-2xl cursor-pointer transition-all flex items-center gap-3 text-gray-600">
                    <span>🚀</span> 4. 進階：自動生成
                </li>
            </ul>
        </div>
    </nav>

    <main class="flex-1 flex flex-col gap-6 overflow-hidden">
        <div class="bg-white rounded-3xl shadow-xl p-8 md:p-12 min-h-[550px] border border-gray-100 flex flex-col">
            <h2 id="current-title" class="text-3xl font-black text-gray-800 mb-8 border-b pb-6">工作流示範</h2>
            <div id="content-area" class="flex-1"></div>
        </div>
    </main>
</div>

<footer class="bg-white border-t py-10 mt-12 text-center text-gray-400 text-[10px] tracking-widest font-black uppercase">
    &copy; 2026 Andy Wang &bull; Presentation Revolution
</footer>

<script>
    const chapters = {
        workflow: {
            title: "10 分鐘搞定原本要做 3 小時的簡報",
            html: `
                <div class="max-w-2xl mx-auto space-y-0">
                    <div class="flow-card shadow-sm">
                        <div class="flex items-center gap-4 mb-2">
                            <div class="w-10 h-10 bg-purple-100 rounded-full flex items-center justify-center text-lg">📓</div>
                            <h4 class="font-bold text-purple-700">NotebookLM</h4>
                        </div>
                        <p class="text-xs text-gray-500 pl-14">把雜亂的參考資料、網頁、PDF 丟進去，提煉出「絕對正確」的簡報大綱。</p>
                    </div>
                    <div class="connector"></div>
                    <div class="flow-card shadow-sm">
                        <div class="flex items-center gap-4 mb-2">
                            <div class="w-10 h-10 bg-blue-100 rounded-full flex items-center justify-center text-lg">🚀</div>
                            <h4 class="font-bold text-blue-600">Gemini</h4>
                        </div>
                        <p class="text-xs text-gray-500 pl-14">將大綱轉化為每一頁簡報的標題、內文重點、圖片描述與腳本。</p>
                    </div>
                    <div class="connector"></div>
                    <div class="flow-card bg-gradient-to-r from-indigo-600 to-blue-600 border-none shadow-xl">
                        <div class="flex items-center gap-4 mb-2">
                            <div class="w-10 h-10 bg-white/20 rounded-full flex items-center justify-center text-lg text-white">🎨</div>
                            <h4 class="font-bold text-white">Canva / Gamma</h4>
                        </div>
                        <p class="text-xs text-indigo-100 pl-14 font-medium">最後一步：把 AI 生成的內容填入設計工具，一鍵套用模板，精美簡報誕生！</p>
                    </div>
                </div>
            `
        },
        content: {
            title: "簡報內容的「黃金三法則」",
            html: `
                <div class="max-w-3xl space-y-8">
                    <p class="text-sm text-gray-600 leading-relaxed font-medium">讓 NotebookLM 幫你過濾掉廢話，留下精華：</p>
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                        <div class="p-6 bg-gray-50 rounded-2xl text-center">
                            <div class="text-2xl mb-2">1️⃣</div>
                            <h5 class="font-bold mb-2">一頁一重點</h5>
                            <p class="text-[10px] text-gray-400 leading-relaxed">AI 指令：『請將大綱拆解，確保每一張投影片只講一個核心觀念。』</p>
                        </div>
                        <div class="p-6 bg-gray-50 rounded-2xl text-center">
                            <div class="text-2xl mb-2">2️⃣</div>
                            <h5 class="font-bold mb-2">文字極簡化</h5>
                            <p class="text-[10px] text-gray-400 leading-relaxed">AI 指令：『請幫我將這段長文縮減為 3 個點，每個點不超過 15 個字。』</p>
                        </div>
                        <div class="p-6 bg-gray-50 rounded-2xl text-center">
                            <div class="text-2xl mb-2">3️⃣</div>
                            <h5 class="font-bold mb-2">數據視覺化</h5>
                            <p class="text-[10px] text-gray-400 leading-relaxed">AI 指令：『這組數據適合用圓餅圖還是長條圖表現？請幫我說明理由。』</p>
                        </div>
                    </div>
                </div>
            `
        },
        design: {
            title: "視覺與排版：讓 AI 當你的美編",
            html: `
                <div class="max-w-3xl flex flex-col md:flex-row gap-8 items-center">
                    <div class="flex-1 space-y-4">
                        <p class="text-sm text-gray-600">向 Gemini 索取「視覺設計建議」：</p>
                        <div class="bg-indigo-50 p-4 rounded-xl border border-indigo-100 italic text-[11px] text-indigo-700 leading-relaxed font-medium">
                            「這是一份關於【太空探索】的簡報，請幫我規劃整體配色。
                            我想要酷炫的深色背景，主色調是什麼？適合搭配哪種字體？每一頁該放什麼風格的圖片？」
                        </div>
                    </div>
                    <div class="w-full md:w-64">
                        <div class="slide-mockup shadow-2xl">
                            <div class="h-2 w-12 bg-indigo-500 mb-2"></div>
                            <div class="h-4 w-2/3 bg-white/20 mb-4"></div>
                            <div class="flex gap-2">
                                <div class="flex-1 space-y-1">
                                    <div class="h-1 w-full bg-white/10"></div>
                                    <div class="h-1 w-full bg-white/10"></div>
                                    <div class="h-1 w-1/2 bg-white/10"></div>
                                </div>
                                <div class="w-1/3 aspect-square bg-white/5 rounded"></div>
                            </div>
                        </div>
                    </div>
                </div>
            `
        },
        expert: {
            title: "進階：全自動簡報生成 (Markdown)",
            html: `
                <div class="max-w-3xl space-y-6">
                    <p class="text-sm text-gray-600">如果你懶得複製貼上，試試 <b>Marp</b> 工作流：</p>
                    <div class="bg-gray-900 rounded-xl p-6 font-mono text-[10px] text-green-400 relative overflow-hidden">
                        <div class="absolute top-0 right-0 bg-indigo-500 text-white px-2 py-1">指令範例</div>
                        ---<br>
                        marp: true<br>
                        theme: uncover<br>
                        ---<br><br>
                        # 第一頁標題<br>
                        這裡是內文...<br><br>
                        ---<br><br>
                        # 第二頁標題<br>
                        ![bg right:40%](https://...)
                    </div>
                    <p class="text-[11px] text-gray-400 text-center font-bold">複製這段代碼貼進 Marp.app，你的簡報就自動排版完成了！</p>
                </div>
            `
        }
    };

    function render(id) {
        const data = chapters[id];
        $('#current-title').text(data.title);
        $('#content-area').html(data.html).hide().fadeIn(400);
    }

    $('#menu li').click(function() {
        $('.menu-item').removeClass('active bg-indigo-600 text-white').addClass('hover:bg-indigo-50 text-gray-600');
        $(this).addClass('active bg-indigo-600 text-white').removeClass('hover:bg-indigo-50 text-gray-600');
        render($(this).data('id'));
    });

    $(document).ready(() => render('workflow'));
</script>
</body>
</html>
